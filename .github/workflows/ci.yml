name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci --omit=dev

      - name: Verify startup
        run: node -e "import('./fireclaw.mjs').then(() => { console.log('Module loads OK'); process.exit(0); }).catch(e => { console.error(e); process.exit(1); })"
        timeout-minutes: 1
